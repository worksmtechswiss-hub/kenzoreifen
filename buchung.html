      nachname: '',
      email: '',
      telefon: '',
      strasse: '',
      plz: '',
      ort: '',
      wunschDatum: '',
      wunschZeit: '',
      kontaktZeit: '',
      bemerkungen: '',
      agb: false
    };
    var errors = {};

    /* ═══ DOM REFERENCES ═══ */

    var formCard = document.getElementById('booking-form');
    var stepIndicator = document.getElementById('step-indicator');
    var summaryBar = document.getElementById('booking-summary-bar');
    var headerSub = document.getElementById('booking-header-sub');

    /* ═══ PRICE CALCULATION ═══ */

    function calcPrices() {
      var price = getPrice(form.zoll, form.serviceArt);
      var anfahrt = getAnfahrt(form.anfahrtZone);
      var entsorgungTotal = form.entsorgung ? form.entsorgungAnzahl * ENTSORGUNG_PRO_REIFEN : 0;
      var extrasTotal = 0;
      for (var i = 0; i < form.extras.length; i++) {
        for (var j = 0; j < EXTRAS.length; j++) {
          if (EXTRAS[j].id === form.extras[i]) { extrasTotal += EXTRAS[j].price; break; }
        }
      }
      var slot = null;
      for (var k = 0; k < TIME_SLOTS.length; k++) {
        if (TIME_SLOTS[k].value === form.wunschZeit) { slot = TIME_SLOTS[k]; break; }
      }
      var isAbend = slot ? slot.zuschlag : false;
      var abendZuschlag = isAbend ? ABEND_ZUSCHLAG : 0;
      var total = price + anfahrt + entsorgungTotal + extrasTotal + abendZuschlag;
      return {
        price: price,
        anfahrt: anfahrt,
        entsorgungTotal: entsorgungTotal,
        extrasTotal: extrasTotal,
        isAbend: isAbend,
        abendZuschlag: abendZuschlag,
        total: total
      };
    }

    /* ═══ VALIDATION ═══ */

    function validateStep2() {
      var e = {};
      if (!form.fahrzeugTyp) e.fahrzeugTyp = true;
      if (!form.felgenTyp) e.felgenTyp = true;
      if (form.neueReifen && !form.reifenTyp) e.reifenTyp = true;
      errors = e;
      return Object.keys(e).length === 0;
    }

    function validateStep4() {
      var e = {};
      if (!form.vorname.trim()) e.vorname = true;
      if (!form.nachname.trim()) e.nachname = true;
      if (!form.email.trim() || form.email.indexOf('@') === -1) e.email = true;
      if (!form.telefon.trim()) e.telefon = true;
      if (!form.strasse.trim()) e.strasse = true;
      if (!form.plz.trim()) e.plz = true;
      if (!form.ort.trim()) e.ort = true;
      if (!form.wunschDatum) e.wunschDatum = true;
      if (!form.wunschZeit) e.wunschZeit = true;
      if (!form.kontaktZeit) e.kontaktZeit = true;
      if (!form.agb) e.agb = true;
      errors = e;
      return Object.keys(e).length === 0;
    }

    /* ═══ SET VALUE HELPER ═══ */

    function setVal(key, val) {
      form[key] = val;
      if (errors[key]) { delete errors[key]; }
    }

    function toggleExtra(id) {
      var idx = form.extras.indexOf(id);
      if (idx > -1) {
        form.extras.splice(idx, 1);
      } else {
        form.extras.push(id);
      }
    }

    /* ═══ NAVIGATION ═══ */

    function handleNext() {
      if (step === 1 && !form.service) return;
      if (step === 2 && !validateStep2()) { render(); return; }
      if (step === 4) {
        if (!validateStep4()) { render(); return; }
        submitted = true;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      step++;
      errors = {};
      render();
      window.scrollTo({ top: formCard.offsetTop - 100, behavior: 'smooth' });
    }

    function handleBack() {
      step--;
      errors = {};
      render();
      window.scrollTo({ top: formCard.offsetTop - 100, behavior: 'smooth' });
    }

    function resetForm() {
      step = 1;
      submitted = false;
      form = {
        service: '', serviceArt: 'radwechsel', anfahrtZone: 'winterthur',
        fahrzeugTyp: '', fahrzeugMarke: '', fahrzeugModell: '',
        felgenTyp: '', zoll: 17, reifenTyp: '', reifenDimensionen: '',
        reifenFoto: null, reifenFotoName: '', neueReifen: false,
        neueReifenMarke: '', neueReifenWieBisher: true, neueReifenDimensionen: '',
        entsorgung: false, entsorgungAnzahl: 4,
        vorname: '', nachname: '', email: '', telefon: '',
        strasse: '', plz: '', ort: '', wunschDatum: '', wunschZeit: '',
        kontaktZeit: '', bemerkungen: '', agb: false
      };
      errors = {};
      render();
    }

    /* ═══════════════════════════════════════════
       RENDER FUNCTIONS
       ═══════════════════════════════════════════ */

    function render() {
      var isDirectContact = (form.service === 'reparatur' || form.service === 'geschaeft');

      // Header subtitle
      if (submitted) {
        headerSub.textContent = '';
      } else if (isDirectContact) {
        headerSub.textContent = 'Kontaktieren Sie uns direkt';
      } else {
        headerSub.textContent = 'Buchen Sie Ihren Wunschtermin in nur 4 Schritten';
      }

      // Step indicator
      renderStepIndicator(isDirectContact);

      // Form content
      if (submitted) {
        renderSuccess();
      } else if (step === 1 && form.service === 'reparatur') {
        renderReparaturContact();
      } else if (step === 1 && form.service === 'geschaeft') {
        renderGeschaeftContact();
      } else if (step === 1) {
        renderStep1();
      } else if (step === 2) {
        renderStep2();
      } else if (step === 3) {
        renderStep3();
      } else if (step === 4) {
        renderStep4();
      }

      // Summary bar
      renderSummaryBar(isDirectContact);
    }

    /* ── Step Indicator ── */
    function renderStepIndicator(isDirectContact) {
      if (isDirectContact || submitted) {
        stepIndicator.style.display = 'none';
        return;
      }
      stepIndicator.style.display = 'flex';
      var html = '';
      for (var i = 0; i < STEPS.length; i++) {
        var s = STEPS[i];
        var circleClass = 'booking-step-circle';
        var labelClass = 'booking-step-label';
        var circleContent = '' + s.id;
        if (step > s.id) {
          circleClass += ' done';
          labelClass += ' done';
          circleContent = '<svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        } else if (step === s.id) {
          circleClass += ' active';
          labelClass += ' active';
        }
        html += '<div class="booking-step-item">';
        html += '<div class="booking-step-col">';
        html += '<div class="' + circleClass + '">' + circleContent + '</div>';
        html += '<span class="' + labelClass + '">' + esc(s.label) + '</span>';
        html += '</div>';
        if (i < STEPS.length - 1) {
          html += '<div class="booking-step-line' + (step > s.id ? ' done' : '') + '"></div>';
        }
        html += '</div>';
      }
      stepIndicator.innerHTML = html;
    }

    /* ── Zoll Slider ── */
    function renderZollSlider() {
      var min = 13, max = 24;

      html += '</div></div>';

      html += '<div class="booking-slider-track">';

      html += '<div class="booking-slider-fill" style="width:' + pct + '%;"></div>';
      html += '<input type="range" min="' + min + '" max="' + max + '" step="1" value="' + form.zoll + '" class="booking-slider-input" id="zoll-slider">';
      html += '<div class="booking-slider-thumb" style="left:calc(' + pct + '% - 16px);"><div class="booking-slider-thumb-dot"></div></div>';
      html += '</div>';

      html += '<div class="booking-slider-ticks">';
      for (var z = min; z <= max; z++) {
        html += '<span class="booking-slider-tick' + (z === form.zoll ? ' active' : '') + '">' + z + '</span>';
      }
      html += '</div>';

      html += '<div class="booking-slider-info">';
      html += '<span class="booking-slider-info-label">Preiskategorie ' + getPriceLabel(form.zoll) + '</span>';
      html += '<span class="booking-slider-info-value">CHF ' + price + '.\u2013</span>';
      html += '</div>';

      html += '</div>';
      return html;
    }

    function initSliderEvents() {
      var slider = document.getElementById('zoll-slider');
      if (!slider) return;
      slider.addEventListener('input', function() {
        form.zoll = parseInt(this.value);
        // Update UI without full re-render (smoother)
        var min = 13, max = 24;
        var pct = ((form.zoll - min) / (max - min)) * 100;
        var price = getPrice(form.zoll, form.serviceArt);
        var fill = formCard.querySelector('.booking-slider-fill');
        var thumb = formCard.querySelector('.booking-slider-thumb');
        var valSpan = formCard.querySelector('.booking-slider-value');
        var badge = formCard.querySelector('.booking-slider-badge');
        var info = formCard.querySelector('.booking-slider-info');
        var ticks = formCard.querySelectorAll('.booking-slider-tick');

        if (fill) fill.style.width = pct + '%';
        if (thumb) thumb.style.left = 'calc(' + pct + '% - 16px)';
        if (valSpan) valSpan.textContent = form.zoll + '"';
        if (badge) badge.textContent = 'CHF ' + price + '.\u2013';
        if (info) {
          info.innerHTML = '<span class="booking-slider-info-label">Preiskategorie ' + getPriceLabel(form.zoll) + '</span><span class="booking-slider-info-value">CHF ' + price + '.\u2013</span>';
        }
        for (var i = 0; i < ticks.length; i++) {
          var tickVal = 13 + i;
          if (tickVal === form.zoll) {
            ticks[i].classList.add('active');
          } else {
            ticks[i].classList.remove('active');
          }
        }
      });
    }

    /* ── Photo Upload ── */
    function renderPhotoUpload() {

      html += '<input type="file" accept="image/*" class="booking-file-input" id="foto-input">';
      html += '<div class="booking-upload" id="foto-dropzone">';
      if (form.reifenFotoName) {
        html += '<div class="booking-upload-done"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span>' + esc(form.reifenFotoName) + '</span></div>';
      } else {
        html += '<svg viewBox="0 0 48 48" fill="none"><rect x="6" y="10" width="36" height="28" rx="4" stroke="currentColor" stroke-width="2.5"/><circle cx="18" cy="22" r="4" stroke="currentColor" stroke-width="2"/><path d="M6 34l10-8 6 4 10-10 10 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    function initUploadEvents() {
      var dropzone = document.getElementById('foto-dropzone');
      var fileInput = document.getElementById('foto-input');
      if (!dropzone || !fileInput) return;

      dropzone.addEventListener('click', function() { fileInput.click(); });
      dropzone.addEventListener('dragover', function(e) { e.preventDefault(); dropzone.classList.add('dragover'); });
      dropzone.addEventListener('dragleave', function() { dropzone.classList.remove('dragover'); });
      dropzone.addEventListener('drop', function(e) {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        var file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
          form.reifenFoto = file;
          form.reifenFotoName = file.name;
          render();
        }
      });
      fileInput.addEventListener('change', function() {
        var file = this.files[0];
        if (file && file.type.startsWith('image/')) {
          form.reifenFoto = file;
          form.reifenFotoName = file.name;
          render();
        }
      });
    }

    /* ═══════════════════════════════════════════
       EVENT DELEGATION
       ═══════════════════════════════════════════ */

    formCard.addEventListener('click', function(e) {
      var target = e.target;

      // Check if click is inside a [data-stop-propagation] container but NOT on a button inside it
      // (We want inputs inside expanded toggles to be clickable without toggling)
      var stopProp = target.closest('[data-stop-propagation]');
      if (stopProp && !target.closest('[data-action]')) {
        return;
      }

      // Find closest action element
      var actionEl = target.closest('[data-action]');
      if (!actionEl) return;

      var action = actionEl.getAttribute('data-action');
      var key = actionEl.getAttribute('data-key');
      var value = actionEl.getAttribute('data-value');

      switch (action) {
        case 'select-service':
          setVal('service', value);
          if (value === 'wechsel') {
            render();
            setTimeout(function() { step = 2; errors = {}; render(); }, 300);
          } else {
            render();
          }
          break;

        case 'clear-service':
          setVal('service', '');
          render();
          break;

        case 'set':
          if (key === 'neueReifenWieBisher') {
            setVal(key, value === 'true');
          } else {
            setVal(key, value);
          }
          render();
          if (step === 2) { initSliderEvents(); initUploadEvents(); }
          break;

        case 'toggle':
          if (key === 'neueReifen') {
            setVal('neueReifen', !form.neueReifen);
            render();
            if (step === 2) { initSliderEvents(); initUploadEvents(); }
          } else if (key === 'entsorgung') {
            setVal('entsorgung', !form.entsorgung);
            render();
            render();
          } else if (key === 'agb') {
            setVal('agb', !form.agb);
            render();
          } else if (key && key.startsWith('extra-')) {
            var extraId = key.replace('extra-', '');
            toggleExtra(extraId);
            render();
          }
          break;

        case 'entsorgung-minus':
          e.stopPropagation();
          setVal('entsorgungAnzahl', Math.max(1, form.entsorgungAnzahl - 1));
          render();
          break;

        case 'entsorgung-plus':
          e.stopPropagation();
          setVal('entsorgungAnzahl', Math.min(8, form.entsorgungAnzahl + 1));
          render();
          break;

        case 'next':
          handleNext();
          break;

        case 'back':
          handleBack();
          break;

        case 'reset':
          resetForm();
          window.scrollTo({ top: 0, behavior: 'smooth' });
          break;
      }
    });

    // Input handling with event delegation
    formCard.addEventListener('input', function(e) {
      var target = e.target;
      var key = target.getAttribute('data-key');
      if (key) {
        form[key] = target.value;
        if (errors[key]) delete errors[key];
      }
    });

    formCard.addEventListener('change', function(e) {
      var target = e.target;
      var key = target.getAttribute('data-key');
      if (key && (target.tagName === 'SELECT')) {
        form[key] = target.value;
        if (errors[key]) delete errors[key];

        // Remove placeholder class when a value is selected
        if (target.value) {
          target.classList.remove('placeholder');
        } else {
          target.classList.add('placeholder');
        }

        // If wunschZeit changed, re-render to show/hide evening surcharge
        if (key === 'wunschZeit') {
          render();
        }
      }
    });

    /* ═══ INITIAL RENDER ═══ */
    render();

  })();
  </script>

</body>
</html>
