[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Winterthur Hub
[[redirects]]
  from = "/winterthur"
  to = "/winterthur/"
  status = 301
  force = true

